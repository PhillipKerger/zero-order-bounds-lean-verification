name = "zero_order_bounds"
version = "0.1.0"
keywords = ["math"]
defaultTargets = ["ZeroOrderBounds", "FullDMinusOneHalfAccuracy"]

[leanOptions]
pp.unicode.fun = true # pretty-prints `fun a ↦ b`
relaxedAutoImplicit = false
weak.linter.mathlibStandardSet = true
maxSynthPendingDepth = 3

[[require]]
name = "mathlib"
scope = "leanprover-community"
rev = "v4.32.0"

[[lean_lib]]
name = "ZeroOrderBounds"

[[lean_lib]]
name = "Challenge-d-3-accuracy"

[[lean_lib]]
name = "Solution"

[[lean_lib]]
name = "FullDMinusOneHalfAccuracy"
