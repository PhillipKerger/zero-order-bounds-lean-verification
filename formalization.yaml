    which tools produced each part of the Lean code.

fidelity:
  divergences: >-
    The Lean endpoint does not formalize the manuscript's headline theorem.
    The manuscript proves an Omega(d^2/log(d+1)) lower bound at accuracy of
    order d^-1/2 in all sufficiently large dimensions, using aggregate width
    across many rows. The Lean proof instead uses one surviving row and proves
    a stronger quadratic horizon bound at the substantially smaller accuracy
    1/(25000000*d^3), only for even d=2m with d at least 2000. A lower bound at
    d^-3 accuracy does not imply the manuscript's d^-1/2 lower bound.

    The public Lean theorem is fixed-horizon and uses exactly T transcript
    entries. Padding a strategy that stops within T rounds, embedding odd
    dimensions, and lifting the admissible hard family to the full convex
    one-Lipschitz class are mathematical corollaries described in the
    documentation but are not packaged as public Lean declarations. The
    manuscript's Protasov upper bound, aggregate-width argument, and
    mixed-integer transfer are not formalized.

review:
  status: "self-assessed; agent-audited"
  reviewers:
    - "Phillip Kerger"
    - "GitHub Copilot (statement and metadata audit, 2026-07-16)"
  notes: >-
    Repository verification records a successful kernel build, an empty
    production-source scan for proof shortcuts, and final-theorem dependencies
    only on propext, Classical.choice, and Quot.sound. The Comparator fixture
    checks that the reviewed challenge statement is exactly the statement
    proved by the solution wrapper. These checks are not independent external
    mathematical peer review.

alignment:
  namespace: "ZeroOrderBounds"
  statements:
    - source: "Manuscript Theorem 1 (Deterministic lower bound)"
      status: "not-formalized"
      note: >-
        The d^-1/2 accuracy and Omega(d^2/log(d+1)) statement is outside the
        current Lean scope.

    - source: "Repository fixed-horizon d^-3 lower-bound specification"
      lean: "ZeroOrderBounds.fixedHorizonLowerBound_strict"
      module: "ZeroOrderBounds.Main"
      status: "proved"
      note: >-
        Production endpoint for the strict explicit objective gap. The
        Comparator wrapper additionally includes the already-proved
        normalization, convexity, and global one-Lipschitz certificates for
        the returned hard objective.

    - source: "Hard max-linear family: convexity, normalization, and Lipschitzness"
      lean: "ZeroOrderBounds.convexOn_hardObjective; ZeroOrderBounds.hardObjective_zero; ZeroOrderBounds.hardObjective_lipschitzWith_one"
      module: "ZeroOrderBounds.HardFamily"
      status: "proved-as-components"

    - source: "Exact resisting-oracle and normalized-volume backbone"
      lean: "ZeroOrderBounds.oracleRun_final_budgets"
      module: "ZeroOrderBounds.OracleRun"
      status: "proved-as-components"

    - source: "Manuscript Corollary 1 (Mixed-integer consequence)"
      status: "not-formalized"
      note: "The mixed-integer transfer theorem and its application are outside the Lean scope."

acknowledgements: >-
  Built on Lean 4 and Mathlib. Comparator configuration follows the
