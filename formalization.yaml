    Repository verification records a successful kernel build, an empty
    production-source scan for proof shortcuts, and final-theorem dependencies
    only on propext, Classical.choice, and Quot.sound. The two Comparator
    fixtures check that each reviewed challenge statement is exactly the
    statement proved by its solution wrapper. These checks are not independent
    external mathematical peer review.

alignment:
  namespace: "ZeroOrderBounds"
  statements:
    - source: "Manuscript deterministic lower bound (Theorem thm:lower)"
      lean: "ZeroOrderBounds.AccuracyImprovement.fixedHorizonSqrtLowerBound_strict; ZeroOrderBounds.AccuracyImprovement.not_atMostPaperQueryBudgetSucceedsWithinSqrt_and_rate; ZeroOrderBounds.AccuracyImprovement.not_ambientAtMostPaperQueryBudgetSucceedsWithin_oddSqrtAccuracy_and_rate"
      module: "FullDMinusOneHalfAccuracy.Main; FullDMinusOneHalfAccuracy.PaperStopping"
      status: "proved-as-components"
      note: >-
        The even and odd endpoints use accuracy constant 10^-7. The even
        first-unruled-out horizon exceeds d^2/(800*log(d+1)); the odd analogue
        uses 1800. Exact-horizon and at-most wrappers are separated for audit.

    - source: "Manuscript scaling lemma for radius R and Lipschitz constant L"
      lean: "ZeroOrderBounds.AccuracyImprovement.scaledFixedHorizonLowerBound_strict_of_le_sqrtAccuracy; ZeroOrderBounds.AccuracyImprovement.not_radiusAtMostPaperQueryBudgetSucceedsWithinSqrt_and_rate"
      module: "FullDMinusOneHalfAccuracy.ScaledMain; FullDMinusOneHalfAccuracy.PaperStopping"
      status: "proved"
      note: >-
        Includes exact query/answer transport, class and minimizer
        certificates, LR gap scaling, monotonicity to smaller errors, and a
        transcript-dependent at-most-budget form in the even block model.

    - source: "Repository fixed-horizon d^-3 lower-bound specification"
      lean: "ZeroOrderBounds.fixedHorizonLowerBound_strict"
      module: "ZeroOrderBounds.Main"
      status: "proved"
      note: >-
        Production endpoint for the strict explicit objective gap. The
        Comparator wrapper additionally includes the already-proved
        normalization, convexity, and global one-Lipschitz certificates for
        the returned hard objective.

    - source: "Hard max-linear family: convexity, normalization, and Lipschitzness"
      lean: "ZeroOrderBounds.convexOn_hardObjective; ZeroOrderBounds.hardObjective_zero; ZeroOrderBounds.hardObjective_lipschitzWith_one"
      module: "ZeroOrderBounds.HardFamily"
      status: "proved-as-components"

    - source: "Exact resisting-oracle and normalized-volume backbone"
      lean: "ZeroOrderBounds.oracleRun_final_budgets"
      module: "ZeroOrderBounds.OracleRun"
      status: "proved-as-components"

    - source: "Brunn--Minkowski and intrinsic Urysohn steps in the manuscript lower bound"
      lean: "ZeroOrderBounds.AccuracyImprovement.brunnMinkowskiAt_euclidean; ZeroOrderBounds.AccuracyImprovement.two_mul_intrinsicVolumeRadius_le_intrinsicMeanWidth_unconditional"
      module: "FullDMinusOneHalfAccuracy.BrunnMinkowskiInduction; FullDMinusOneHalfAccuracy.UrysohnMain"
      status: "proved-as-components"

    - source: "Manuscript headline upper bound and two-sided conclusion"
      status: "not-formalized"
      note: "The Protasov upper bound and its corollaries are outside the Lean scope."

    - source: "Manuscript Corollary 1 (Mixed-integer consequence)"
      status: "not-formalized"
      note: "The mixed-integer transfer theorem and its application are outside the Lean scope."

acknowledgements: >-
  Built on Lean 4 and Mathlib. Comparator configuration follows the
  leanprover/comparator challenge/solution verification pattern.
