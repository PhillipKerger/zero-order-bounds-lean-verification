fidelity:
  divergences: >-
    The manuscript's deterministic lower-bound argument and d^-1/2 accuracy
    are formalized, with explicit constants. The narrow Comparator statement
    is the even-dimensional exact-horizon hard-family theorem. At-most-query,
    floor/rate, odd-dimensional, and radius/Lipschitz results are exposed as
    additional declarations, including odd and scaled at-most-query models;
    no single declaration combines odd ambient dimension with radius/Lipschitz
    scaling. The original d^-3 theorem remains as a separate endpoint.

    The manuscript's headline theorem is two-sided. Its Protasov upper bound,
    the resulting widetildeTheta(d^2) conclusion, the polynomial-accuracy upper
    corollary, the common-optimum and radial-box reductions, and the
    mixed-integer transfer are not formalized.

