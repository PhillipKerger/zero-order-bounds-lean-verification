status:
  scope: >-
    Lean 4 and Mathlib formalization of two deterministic exact-value convex
    optimization lower bounds. The preserved endpoint proves, for d=2m,
    m at least 1000, and 1000*T at most m^2, a strict error greater than
    1/(200000000*m^3). The improved endpoint proves, for positive m and
    T at most m^2/(100*log(e*m)), a strict error greater than
    10^-7/sqrt(2m). It formalizes the manuscript's aggregate-width argument,
    including spherical averaging, Brunn--Minkowski, intrinsic Urysohn, and
    the exact resisting oracle. Additional checked declarations cover
    transcript-dependent stopping by padding, the floored query budget and
    an explicit d^2/(800*log(d+1)) even-dimensional rate, projection/lifting
    to dimension 2m+1 with an explicit rate constant 1800, and radius/Lipschitz
    scaling with smaller-error monotonicity. Dedicated ambient and radius
    stopping models give at-most-query forms for the odd and scaled results.
    These wrappers are separate declarations rather than one combined
    odd-plus-scaled theorem. The
    Protasov upper bound, two-sided result, and mixed-integer transfer are not
    formalized. Sorry counts exclude both statement-only Comparator challenge
    fixtures.
  sorry_count: 0
  sorry_in_definitions: 0
  axioms:
    - "propext"
    - "Classical.choice"
    - "Quot.sound"
  main_results:
    - declaration: "ZeroOrderBounds.fixedHorizonLowerBound_strict"
      file: "ZeroOrderBounds/Main.lean"
      sorry_count: 0
      axioms:
        - "propext"
        - "Classical.choice"
        - "Quot.sound"
      comparator_config: "comparator/fixed_horizon_lower_bound.json"
