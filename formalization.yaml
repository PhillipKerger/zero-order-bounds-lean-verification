status:
  scope: >-
    Lean 4 and Mathlib formalization of an even-dimensional fixed-horizon
    lower bound for deterministic exact-value convex optimization. For m at
    least 1000 and 1000*T at most m^2, the public theorem defeats every
    deterministic strategy on an admissible convex one-Lipschitz max-linear
    objective with strict error greater than
    1/(200000000*m^3). The proof formalizes the hard family, projection
    geometry, exact resisting oracle, intrinsic-volume potential, one-row
    sensitivity argument, and final indistinguishability step. The manuscript's
    stronger d^-1/2 accuracy theorem, odd-dimensional embedding,
    variable-stopping-time wrapper, full-class wrapper, upper bound, and
    mixed-integer corollary are not separate Lean endpoints. Sorry counts
    exclude the statement-only Comparator challenge fixture.
  sorry_count: 0
  sorry_in_definitions: 0
  axioms:
    - "propext"
    - "Classical.choice"
    - "Quot.sound"
  main_results:
    - declaration: "ZeroOrderBounds.fixedHorizonLowerBound_strict"
      file: "ZeroOrderBounds/Main.lean"
      sorry_count: 0
      axioms:
        - "propext"
        - "Classical.choice"
        - "Quot.sound"
      comparator_config: "comparator/fixed_horizon_lower_bound.json"
      literature_dependencies: []

automation:
  methods:
    - method: "other"
      models: []
      framework: "not recorded"
      tool_setup: >-
        The repository does not contain a complete session transcript or tool
        inventory establishing how the Lean source was produced.
      cost:
        wall_time: "not recorded"
        spend_usd: "not recorded"
        hardware: "not recorded"
      prompting_notes: "not recorded"
  spend_usd: "not recorded"
  notes: >-
    The bundled manuscript reports extensive use of GPT 5.6 Sol Pro in the
